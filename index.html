<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Link In Bio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      min-height:100vh;
      background:#0f172a;
      overflow-x:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      position:relative;
      color:white;
    }

    /* Background Glow */

    .bg-glow{
      position:absolute;
      width:400px;
      height:400px;
      background:#2563eb;
      filter:blur(120px);
      opacity:0.25;
      border-radius:50%;
      top:-100px;
      animation:floatGlow 8s ease-in-out infinite;
    }

    .bg-glow2{
      position:absolute;
      width:300px;
      height:300px;
      background:#7c3aed;
      filter:blur(120px);
      opacity:0.2;
      border-radius:50%;
      bottom:-100px;
      right:-80px;
      animation:floatGlow2 10s ease-in-out infinite;
    }

    @keyframes floatGlow{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(30px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    @keyframes floatGlow2{
      0%{
        transform:translateX(0px);
      }
      50%{
        transform:translateX(-30px);
      }
      100%{
        transform:translateX(0px);
      }
    }

    /* Card */

    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border-radius:32px;
      padding:35px 25px;
      text-align:center;
      position:relative;
      z-index:2;
      box-shadow:
      0 10px 30px rgba(0,0,0,0.3),
      inset 0 1px 1px rgba(255,255,255,0.08);

      animation:fadeUp 1s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .profile-wrapper{
      position:relative;
      width:120px;
      height:120px;
      margin:auto;
      margin-bottom:22px;
    }

    .profile-ring{
      position:absolute;
      inset:-4px;
      border-radius:50%;
      background:linear-gradient(
        135deg,
        #3b82f6,
        #8b5cf6,
        #ec4899
      );
      animation:spin 6s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

    .profile-img{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #0f172a;
      z-index:2;
    }

    h1{
      font-size:30px;
      font-weight:700;
      margin-bottom:8px;
      letter-spacing:-1px;
    }

    .username{
      color:#94a3b8;
      font-size:15px;
      margin-bottom:18px;
    }

    .bio{
      font-size:15px;
      line-height:1.7;
      color:#cbd5e1;
      margin-bottom:30px;
    }

    /* Links */

    .links{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .link-btn{
      position:relative;
      text-decoration:none;
      color:white;
      padding:17px;
      border-radius:18px;
      font-weight:600;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      overflow:hidden;
      transition:0.35s ease;
      backdrop-filter:blur(10px);

      opacity:0;
      transform:translateY(20px);
      animation:showLinks 0.7s forwards;
    }

    .link-btn:nth-child(1){
      animation-delay:0.2s;
    }

    .link-btn:nth-child(2){
      animation-delay:0.4s;
    }

    .link-btn:nth-child(3){
      animation-delay:0.6s;
    }

    .link-btn:nth-child(4){
      animation-delay:0.8s;
    }

    .link-btn:nth-child(5){
      animation-delay:1s;
    }

    @keyframes showLinks{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .link-btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.15),
        transparent
      );
      transition:0.6s;
    }

    .link-btn:hover::before{
      left:100%;
    }

    .link-btn:hover{
      transform:translateY(-4px) scale(1.02);
      background:rgba(255,255,255,0.12);
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }

    /* Footer */

    .footer{
      margin-top:28px;
      color:#94a3b8;
      font-size:13px;
    }

    /* Floating Dots */

    .dot{
      position:absolute;
      border-radius:50%;
      background:white;
      opacity:0.15;
      animation:floatDots linear infinite;
    }

    .dot1{
      width:10px;
      height:10px;
      top:15%;
      left:12%;
      animation-duration:8s;
    }

    .dot2{
      width:14px;
      height:14px;
      bottom:20%;
      right:10%;
      animation-duration:12s;
    }

    .dot3{
      width:8px;
      height:8px;
      top:50%;
      right:18%;
      animation-duration:10s;
    }

    @keyframes floatDots{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    /* Responsive */

    @media(max-width:480px){

      .card{
        padding:30px 18px;
        border-radius:26px;
      }

      h1{
        font-size:26px;
      }

      .bio{
        font-size:14px;
      }

      .link-btn{
        padding:16px;
        font-size:15px;
      }

    }

  </style>
</head>

<body>

  <!-- Background -->

  <div class="bg-glow"></div>
  <div class="bg-glow2"></div>

  <div class="dot dot1"></div>
  <div class="dot dot2"></div>
  <div class="dot dot3"></div>

  <!-- Card -->

  <div class="card">

    <div class="profile-wrapper">
      <div class="profile-ring"></div>

      <img
        class="profile-img"
        src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400&auto=format&fit=crop"
      >
    </div>

    <h1>John Doe</h1>

    <div class="username">
      @johndoe
    </div>

    <p class="bio">
      Digital creator, freelancer, and web designer helping brands create modern online experiences.
    </p>

    <div class="links">

      <a href="https://instagram.com" class="link-btn" target="_blank">
        Instagram
      </a>

      <a href="https://tiktok.com" class="link-btn" target="_blank">
        TikTok
      </a>

      <a href="https://youtube.com" class="link-btn" target="_blank">
        YouTube
      </a>

      <a href="https://facebook.com" class="link-btn" target="_blank">
        Facebook
      </a>

      <a href="#" class="link-btn">
        My Portfolio
      </a>

    </div>

    <div class="footer">
      Minimal • Modern • Responsive
    </div>

  </div>

  <script>

    // Smooth hover tilt effect

    const card = document.querySelector(".card");

    document.addEventListener("mousemove", (e) => {

      const x = (window.innerWidth / 2 - e.pageX) / 35;
      const y = (window.innerHeight / 2 - e.pageY) / 35;

      card.style.transform =
      `rotateY(${x}deg) rotateX(${-y}deg)`;

    });

    document.addEventListener("mouseleave", () => {

      card.style.transform =
      "rotateY(0deg) rotateX(0deg)";

    });

  </script>

</body>
</html>
