<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heart Digital — Bio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F5F2EE;
      --surface: #FDFBF8;
      --border: rgba(0,0,0,0.07);
      --ink: #1A1714;
      --ink-soft: #6B6560;
      --ink-mute: #A8A39E;
      --accent: #C9622B;
      --accent-light: #F0DDD3;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      min-height: 100svh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 48px;
      position: relative;
      overflow-x: hidden;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 340px; height: 340px;
      background: #E8C8B8;
      top: -80px; right: -60px;
      opacity: 0.55;
      animation: drift1 14s ease-in-out infinite;
    }
    .blob-2 {
      width: 260px; height: 260px;
      background: #D4C4F0;
      bottom: -60px; left: -40px;
      opacity: 0.3;
      animation: drift2 18s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(-20px,30px) scale(1.06); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(18px,-24px) scale(1.08); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 28px 36px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.06), 0 24px 60px rgba(0,0,0,0.04);
      animation: rise 0.9s cubic-bezier(.22,.97,.47,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .avatar-wrap {
      width: 96px; height: 96px;
      margin: 0 auto 24px;
      position: relative;
    }

    .avatar-ring {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, #E8A87C 90deg, #D4C4F0 200deg, var(--accent) 360deg);
      animation: spin 8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-inner {
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      z-index: 2;
    }

    .avatar-inner img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar-placeholder {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      color: var(--accent);
    }

    .name {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .handle {
      font-size: 13px;
      color: var(--ink-mute);
      letter-spacing: 0.04em;
      margin-bottom: 18px;
    }

    .divider {
      width: 32px; height: 1.5px;
      background: var(--accent);
      margin: 0 auto 18px;
      border-radius: 2px;
      opacity: 0.7;
    }

    .bio {
      font-size: 14px;
      line-height: 1.75;
      color: var(--ink-soft);
      font-weight: 300;
      margin-bottom: 32px;
      font-style: italic;
      font-family: 'Instrument Serif', serif;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--ink);
      padding: 13px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: background 0.22s ease, border-color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
      position: relative;
      overflow: hidden;

      opacity: 0;
      transform: translateY(14px);
      animation: linkIn 0.55s cubic-bezier(.22,.97,.47,1) forwards;
    }

    .link-btn:nth-child(1) { animation-delay: 0.25s; }
    .link-btn:nth-child(2) { animation-delay: 0.37s; }
    .link-btn:nth-child(3) { animation-delay: 0.49s; }
    .link-btn:nth-child(4) { animation-delay: 0.61s; }
    .link-btn:nth-child(5) { animation-delay: 0.73s; }

    @keyframes linkIn { to { opacity: 1; transform: translateY(0); } }

    .link-btn:hover {
      background: var(--accent-light);
      border-color: rgba(201,98,43,0.2);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201,98,43,0.1);
    }

    .link-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .link-icon svg, .link-icon img {
      width: 22px; height: 22px;
      display: block;
    }

    /* Platform brand colors on icon bg */
    .icon-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
    .icon-tiktok    { background: #010101; }
    .icon-youtube   { background: #FF0000; }
    .icon-facebook  { background: #1877F2; }
    .icon-portfolio { background: #1A1714; }

    .link-label { flex: 1; text-align: left; }

    .link-arrow {
      color: var(--ink-mute);
      font-size: 13px;
      transition: transform 0.22s ease, color 0.22s ease;
      flex-shrink: 0;
    }

    .link-btn:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    .footer {
      margin-top: 28px;
      font-size: 11.5px;
      color: var(--ink-mute);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 440px) {
      .card { padding: 32px 20px 28px; border-radius: 22px; }
      .name { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">

    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-inner">
        <!-- Replace YOUR_FILE_ID with your Google Drive image file ID -->
        <!-- <img src="https://drive.google.com/thumbnail?id=YOUR_FILE_ID&sz=w200" alt="Heart Digital Logo"> -->
        <div class="avatar-placeholder">♥</div>
      </div>
    </div>

    <h1 class="name">Heart Digital</h1>
    <div class="handle">@heartdigital</div>
    <div class="divider"></div>
    <p class="bio">Products &amp; services crafted for<br>the modern digital world.</p>

    <div class="links">

      <!-- Instagram -->
      <a href="https://instagram.com" class="link-btn" target="_blank" rel="noopener">
        <span class="link-icon icon-instagram">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="white" stroke-width="1.8" fill="none"/>
            <circle cx="12" cy="12" r="4.5" stroke="white" stroke-width="1.8" fill="none"/>
            <circle cx="17.5" cy="6.5" r="1" fill="white"/>
          </svg>
        </span>
        <span class="link-label">Instagram</span>
        <span class="link-arrow">→</span>
      </a>

      <!-- TikTok -->
      <a href="https://tiktok.com" class="link-btn" target="_blank" rel="noopener">
        <span class="link-icon icon-tiktok">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.27 8.27 0 0 0 4.84 1.56V6.79a4.85 4.85 0 0 1-1.07-.1z"/>
          </svg>
        </span>
        <span class="link-label">TikTok</span>
        <span class="link-arrow">→</span>
      </a>

      <!-- YouTube -->
      <a href="https://youtube.com" class="link-btn" target="_blank" rel="noopener">
        <span class="link-icon icon-youtube">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </span>
        <span class="link-label">YouTube</span>
        <span class="link-arrow">→</span>
      </a>

      <!-- Facebook -->
      <a href="https://facebook.com" class="link-btn" target="_blank" rel="noopener">
        <span class="link-icon icon-facebook">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </span>
        <span class="link-label">Facebook</span>
        <span class="link-arrow">→</span>
      </a>

      <!-- Portfolio -->
      <a href="#" class="link-btn">
        <span class="link-icon icon-portfolio">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </span>
        <span class="link-label">My Portfolio</span>
        <span class="link-arrow">→</span>
      </a>

    </div>

    <div class="footer">Heart Digital &nbsp;·&nbsp; 2025</div>
  </div>

  <script>
    const card = document.querySelector('.card');
    let ticking = false;

    document.addEventListener('mousemove', (e) => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const rx = (e.clientY - cy) / cy * -5;
        const ry = (e.clientX - cx) / cx * 5;
        card.style.transition = 'transform 0.08s linear';
        card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
        ticking = false;
      });
    });

    document.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.6s ease';
      card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    });
  </script>

</body>
</html>
